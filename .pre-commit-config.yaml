---
exclude: .*csv
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.4.0
  hooks:
  - id: end-of-file-fixer
    exclude: ^\.yarn/releases/
  - id: trailing-whitespace
    exclude: ^\.yarn/releases/
  - id: mixed-line-ending
  - id: check-byte-order-marker
  - id: check-merge-conflict
  - id: check-yaml
    exclude: ^(app-config.*\.yaml$|examples/)
  - id: check-json
- repo: https://github.com/adrienverge/yamllint
  rev: v1.33.0
  hooks:
  - id: yamllint
    args: [-c, .yamllint]
    files: \.(yaml|yml)$
    exclude: ^(app-config.*\.yaml$|examples/|catalog-info\.yaml|\.yarnrc\.yml|\.github/settings\.yml)
